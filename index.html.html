<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Recortable de Perritos</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #ff6b6b;
            margin-bottom: 5px;
        }
        p.instructions {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .cutout {
            background-color: white;
            border: 4px dashed #ff9f43;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .scissors-top-left {
            position: absolute;
            top: -15px;
            left: -15px;
            font-size: 30px;
            background-color: #f0f8ff;
            padding: 5px;
            transform: rotate(-25deg);
        }
        .scissors-bottom-right {
            position: absolute;
            bottom: -15px;
            right: -15px;
            font-size: 30px;
            background-color: #f0f8ff;
            padding: 5px;
            transform: rotate(155deg);
        }
        .puppy-svg {
            width: 150px;
            height: 150px;
        }
        .puppy-name {
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a69bd;
        }
        
        /* Estilos para impresión */
        @media print {
            body {
                background-color: white;
            }
            .grid-container {
                gap: 20px;
            }
            .cutout {
                box-shadow: none;
                border: 4px dashed #999;
            }
            .scissors-top-left, .scissors-bottom-right {
                background-color: white;
            }
            /* Ocultar botón de imprimir al imprimir */
            .print-btn {
                display: none;
            }
        }

        .print-btn {
            background-color: #1dd1a1;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .print-btn:hover {
            transform: scale(1.05);
            background-color: #10ac84;
        }
    </style>
</head>
<body>

    <h1>🐶 ¡Perritos para Recortar! ✂️</h1>
    <p class="instructions">Pide ayuda a un adulto para usar las tijeras y recorta por la línea punteada.</p>
    
    <button class="print-btn" onclick="window.print()">🖨️ Imprimir Material</button>

    <div class="grid-container">
        <!-- Perrito 1 -->
        <div class="cutout">
            <span class="scissors-top-left">✂️</span>
            <svg class="puppy-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Cabeza -->
                <circle cx="50" cy="50" r="35" fill="#fbc531" />
                <!-- Oreja Izquierda -->
                <ellipse cx="20" cy="35" rx="12" ry="25" fill="#e1b12c" transform="rotate(-20 20 35)" />
                <!-- Oreja Derecha -->
                <ellipse cx="80" cy="35" rx="12" ry="25" fill="#e1b12c" transform="rotate(20 80 35)" />
                <!-- Ojos -->
                <circle cx="35" cy="45" r="5" fill="black" />
                <circle cx="65" cy="45" r="5" fill="black" />
                <!-- Brillo ojos -->
                <circle cx="33" cy="43" r="2" fill="white" />
                <circle cx="63" cy="43" r="2" fill="white" />
                <!-- Nariz -->
                <ellipse cx="50" cy="55" rx="8" ry="5" fill="black" />
                <!-- Boca -->
                <path d="M 40 65 Q 50 75 60 65" fill="transparent" stroke="black" stroke-width="3" stroke-linecap="round"/>
                <!-- Lengua -->
                <path d="M 45 68 Q 50 85 55 68 Z" fill="#ff6b81" />
            </svg>
            <div class="puppy-name">Manchas</div>
            <span class="scissors-bottom-right">✂️</span>
        </div>

        <!-- Perrito 2 -->
        <div class="cutout">
            <span class="scissors-top-left">✂️</span>
            <svg class="puppy-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Cabeza -->
                <circle cx="50" cy="50" r="35" fill="#dcdde1" />
                <!-- Mancha en el ojo -->
                <circle cx="35" cy="45" r="12" fill="#718093" />
                <!-- Oreja Izquierda -->
                <path d="M 15 40 Q 5 70 20 60 Q 30 35 15 40" fill="#718093" />
                <!-- Oreja Derecha -->
                <path d="M 85 40 Q 95 70 80 60 Q 70 35 85 40" fill="#718093" />
                <!-- Ojos -->
                <circle cx="35" cy="45" r="4" fill="black" />
                <circle cx="65" cy="45" r="4" fill="black" />
                <!-- Brillo ojos -->
                <circle cx="34" cy="44" r="1.5" fill="white" />
                <circle cx="64" cy="44" r="1.5" fill="white" />
                <!-- Nariz -->
                <circle cx="50" cy="58" r="6" fill="black" />
                <!-- Boca -->
                <path d="M 42 66 Q 50 72 58 66" fill="transparent" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <div class="puppy-name">Lulú</div>
            <span class="scissors-bottom-right">✂️</span>
        </div>

        <!-- Perrito 3 -->
        <div class="cutout">
            <span class="scissors-top-left">✂️</span>
            <svg class="puppy-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Cabeza -->
                <rect x="20" y="20" width="60" height="60" rx="20" fill="#cd6133" />
                <!-- Oreja Izquierda erguida -->
                <polygon points="25,30 15,5 40,20" fill="#b33939" transform="rotate(-10 25 30) translate(-3, 0)" />
                <!-- Oreja Derecha erguida -->
                <polygon points="75,30 85,5 60,20" fill="#b33939" transform="rotate(10 75 30) translate(3, 0)" />
                <!-- Ojos grandes -->
                <circle cx="35" cy="45" r="8" fill="white" />
                <circle cx="65" cy="45" r="8" fill="white" />
                <circle cx="35" cy="45" r="4" fill="black" />
                <circle cx="65" cy="45" r="4" fill="black" />
                <!-- Nariz -->
                <polygon points="45,55 55,55 50,62" fill="black" />
                <!-- Boca simple -->
                <path d="M 45 68 L 50 72 L 55 68" fill="transparent" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="puppy-name">Max</div>
            <span class="scissors-bottom-right">✂️</span>
        </div>

        <!-- Perrito 4 -->
        <div class="cutout">
            <span class="scissors-top-left">✂️</span>
            <svg class="puppy-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Cabeza -->
                <ellipse cx="50" cy="55" rx="40" ry="30" fill="#c8d6e5" />
                <!-- Orejas caídas -->
                <ellipse cx="15" cy="65" rx="10" ry="25" fill="#8395a7" />
                <ellipse cx="85" cy="65" rx="10" ry="25" fill="#8395a7" />
                <!-- Pelo -->
                <path d="M 40 25 Q 50 15 60 25 Q 55 20 50 25 Q 45 20 40 25 Z" fill="#8395a7" />
                <!-- Ojos cerrados -->
                <path d="M 30 45 Q 35 40 40 45" fill="transparent" stroke="black" stroke-width="3" stroke-linecap="round"/>
                <path d="M 60 45 Q 65 40 70 45" fill="transparent" stroke="black" stroke-width="3" stroke-linecap="round"/>
                <!-- Nariz -->
                <circle cx="50" cy="55" r="5" fill="black" />
                <!-- Boca sonriente -->
                <path d="M 35 65 Q 50 80 65 65" fill="transparent" stroke="black" stroke-width="3" stroke-linecap="round"/>
                <!-- Lengua -->
                <path d="M 45 73 Q 50 90 55 73 Z" fill="#ff9ff3" />
            </svg>
            <div class="puppy-name">Bimbollo</div>
            <span class="scissors-bottom-right">✂️</span>
        </div>
    </div>

</body>
</html>
